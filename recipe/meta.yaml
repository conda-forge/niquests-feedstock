{% set name = "niquests" %}
{% set version = "3.17.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/niquests-{{ version }}.tar.gz
  sha256: 1f4f337a973215c76f6f6471504fedab9dc6187203284146081e1bd3d2a311fc

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling >=1.6.0,<2
    - pip
  run:
    - urllib3.future >=2.13.903,<3
    - python >={{ python_min }}
    - charset-normalizer <4,>=2
    - wassima <3,>=1.0.1
    - urllib3-future <3,>=2.13.903
    # - orjson <4,>=3

test:
  imports:
    - niquests
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/jawah/niquests
  summary: Niquests is a simple, yet elegant, HTTP library. It is a drop-in replacement for Requests, which is under feature freeze.
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE

extra:
  recipe-maintainers:
    - rxm7706
    - jan-janssen
