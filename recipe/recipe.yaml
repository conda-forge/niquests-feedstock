schema_version: 1

context:
  name: niquests
  version: 3.18.8

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/niquests-${{ version }}.tar.gz
  sha256: 06244ef4d1c93b067295b22c1d7a8938be948af1227d368c22acf531f61fdf57

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.6.0,<2
    - pip
  run:
    - python >=${{ python_min }}
    - charset-normalizer >=2,<4
    - wassima >=1.0.1,<3
    - urllib3-future <3,>=2.13.903
    - urllib3.future >=2.13.903,<3
tests:
  - python:
      imports:
        - niquests
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Niquests is a simple, yet elegant, HTTP library. It is a drop-in replacement for Requests, which is under feature freeze.
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE
  homepage: https://github.com/jawah/niquests

extra:
  recipe-maintainers:
    - rxm7706
    - jan-janssen
