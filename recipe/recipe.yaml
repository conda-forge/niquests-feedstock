schema_version: 1

context:
  name: niquests
  version: "3.17.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/niquests-${{ version }}.tar.gz
  sha256: 1f4f337a973215c76f6f6471504fedab9dc6187203284146081e1bd3d2a311fc

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.6.0,<2
    - pip
  run:
    - python >=${{ python_min }}
    - charset-normalizer <4,>=2
    - wassima <3,>=1.0.1
    - urllib3-future <3,>=2.13.903
    # - orjson <4,>=3

tests:
  - python:
      imports:
        - niquests
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Niquests is a simple, yet elegant, HTTP library. It is a drop-in replacement for Requests, which is under feature freeze.
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE
  homepage: https://github.com/jawah/niquests

extra:
  recipe-maintainers:
    - rxm7706
    - jan-janssen
